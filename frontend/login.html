<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登入 · CellTrail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* fallback 背景（video 不可用時） */
    html {
      height: 100%;
      background: #050a19;
    }
    body {
      min-height: 100%;
      background: transparent;
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8eef8;
      overflow-x: hidden;
    }

    /* ── 影片背景 ── */
    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -1;
      pointer-events: none;
    }
    #bgOverlay {
      position: fixed;
      inset: 0;
      background: rgba(5, 10, 25, 0.60);
      z-index: 0;
    }

    /* ── 主容器 ── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 16px 48px;
      gap: 0;
    }

    /* ── 登入卡片（含 Logo） ── */
    .card {
      width: min(90vw, 420px);
      border-radius: 12px;
      padding: 0 0 28px;      /* 頂部 padding 由 .card-logo 控制 */
      background: rgba(8, 18, 40, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: none;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.60);
      opacity: 0;
      animation: fadeInUp .7s ease .2s forwards;
      overflow: hidden;       /* 讓 Logo 區塊貼齊圓角 */
    }

    /* ── 卡片頂部 Logo 區塊 ── */
    .card-logo {
      padding: 24px 30px 0;
      text-align: center;
    }
    .card-logo img {
      width: 100%;
      max-width: 380px;
      height: auto;
      display: block;
      margin: 0 auto;
      background: transparent;
    }
    .card-logo-divider {
      margin: 18px 0 0;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.10);
    }

    /* ── 卡片內容區（Logo 下方） ── */
    .card-body {
      padding: 24px 30px 0;
    }

    /* ── 卡片標題 ── */
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: rgba(180, 210, 255, 0.9);
      margin-bottom: 20px;
      letter-spacing: .5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title::before {
      content: '';
      display: inline-block;
      width: 3px; height: 16px;
      background: linear-gradient(180deg, #0099ff, #0055cc);
      border-radius: 2px;
    }

    /* ── 輸入欄位 ── */
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: rgba(160, 200, 255, 0.75);
      margin-bottom: 6px;
      letter-spacing: .3px;
    }
    .field input[type="text"],
    .field input[type="password"] {
      display: block;
      width: 100%;
      padding: 11px 14px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(0, 150, 255, 0.35);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #e8eef8;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus {
      background: rgba(255, 255, 255, 0.11);
      border-color: rgba(0, 170, 255, 0.75);
      box-shadow:
        0 0 0 3px rgba(0, 140, 255, 0.18),
        0 0 12px rgba(0, 140, 255, 0.12);
    }

    /* ── 錯誤訊息 ── */
    .msg {
      min-height: 17px;
      font-size: 12px;
      color: #ff7070;
      margin: 4px 0 12px;
      letter-spacing: .2px;
    }
    .msg.ok { color: #60e87a; }

    /* ── 登入按鈕 ── */
    .btn-primary {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #0066cc 0%, #0099ff 100%);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: .5px;
      cursor: pointer;
      transition: filter .2s, box-shadow .2s, transform .1s;
      box-shadow: 0 4px 18px rgba(0, 120, 255, 0.35);
      margin-top: 4px;
    }
    .btn-primary:hover {
      filter: brightness(1.18);
      box-shadow: 0 6px 24px rgba(0, 150, 255, 0.55);
    }
    .btn-primary:active { transform: scale(.985); filter: brightness(.95); }
    .btn-primary:disabled {
      background: linear-gradient(135deg, #1a3a66 0%, #1a5577 100%);
      box-shadow: none;
      cursor: not-allowed;
      filter: none;
    }

    /* ── 次要連結 ── */
    .links {
      margin-top: 16px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 12px;
    }
    .links a {
      color: rgba(100, 180, 255, 0.85);
      text-decoration: none;
      transition: color .15s;
    }
    .links a:hover { color: #7dd3fc; }
    .links span {
      color: rgba(130, 170, 220, 0.6);
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      transition: color .15s;
    }
    .links span:hover { color: rgba(130, 170, 220, .9); }

    /* ── 忘記密碼展開框 ── */
    #forgotBox {
      margin-top: 10px;
      background: rgba(0, 40, 80, 0.5);
      border: 1px solid rgba(0, 120, 220, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: rgba(180, 210, 255, 0.8);
      line-height: 1.85;
      text-align: left;
    }

    /* ── 警告框（首次登入） ── */
    .alert-box {
      background: rgba(100, 70, 0, 0.4);
      border: 1px solid rgba(255, 200, 60, 0.4);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #ffd875;
      margin-bottom: 18px;
      line-height: 1.5;
    }

    /* ── Footer ── */
    .footer {
      margin-top: 20px;
      font-size: 11px;
      color: rgba(255,255,255,0.25);
      text-align: center;
      letter-spacing: .3px;
    }

    /* ── 分隔線 ── */
    .section-sep {
      border: none;
      border-top: 1px solid rgba(0, 120, 255, 0.2);
      margin: 0 0 18px;
    }

    /* ── 動畫 ── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RWD ── */
    @media (max-width: 480px) {
      .card-logo { padding: 20px 18px 0; }
      .card-body  { padding: 20px 18px 0; }
      .card { padding-bottom: 22px; }
    }
  </style>
</head>
<body>

<!-- 影片背景 -->
<video id="bgVideo" autoplay muted loop playsinline preload="auto">
  <source src="assets/mp.mp4" type="video/mp4" />
</video>
<div id="bgOverlay"></div>

<div class="page">

  <!-- 登入卡片（Logo 在卡片內） -->
  <div class="card">

    <!-- Logo 頂部 -->
    <div class="card-logo">
      <img src="assets/logo.png" alt="CellTrail" />
      <hr class="card-logo-divider" />
    </div>

    <!-- 表單主體 -->
    <div class="card-body">

    <!-- 登入表單 -->
    <div id="loginSection">
      <div class="card-title">請登入</div>
      <hr class="section-sep" />
      <div class="field">
        <label for="loginUser">帳號</label>
        <input id="loginUser" type="text" placeholder="username" autocomplete="username" />
      </div>
      <div class="field">
        <label for="loginPass">密碼</label>
        <input id="loginPass" type="password" placeholder="password" autocomplete="current-password" />
      </div>
      <div id="loginMsg" class="msg"></div>
      <button id="loginBtn" class="btn-primary">登入</button>
      <div class="links">
        <a href="./register.html">申請帳號</a>
        <span id="forgotToggle">忘記帳號或密碼？</span>
        <div id="forgotBox" style="display:none">
          請電洽管理員辦理重設<br/>
          <b style="color:#aad4ff">管理員電話：</b>07-7193020<br/>
          <b style="color:#aad4ff">服務時間：</b>週一至週五 09:00–17:00
        </div>
      </div>
    </div>

    <!-- 首次登入修改密碼 -->
    <div id="changePassSection" style="display:none">
      <div class="alert-box">⚠ 首次登入需修改密碼，才能進入系統。</div>
      <div class="card-title">設定新密碼</div>
      <hr class="section-sep" />
      <div class="field">
        <label for="newPass1">新密碼（至少 8 字元）</label>
        <input id="newPass1" type="password" autocomplete="new-password" />
      </div>
      <div class="field">
        <label for="newPass2">確認新密碼</label>
        <input id="newPass2" type="password" autocomplete="new-password" />
      </div>
      <div id="changeMsg" class="msg"></div>
      <button id="changeBtn" class="btn-primary">修改密碼並進入系統</button>
    </div>

    <div style="text-align:center;margin-top:18px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.08)">
      <span style="font-size:12px;color:rgba(160,200,255,0.5)">
        不需要帳號？<a href="./index.html" style="color:rgba(120,190,255,0.8);text-decoration:none" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">直接使用基本功能</a>
      </span>
    </div>
    <div class="footer">CellTrail · 高市刑大冠鈞</div>
    </div><!-- /.card-body -->
  </div><!-- /.card -->
</div><!-- /.page -->

<script>
  const TOKEN_KEY = 'ct_token';

  function getApiBase() {
    if (window.__CELLTRAIL_API__) return window.__CELLTRAIL_API__.replace(/\/$/, '');
    const host = location.hostname || '';
    if (/^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\]|192\.168\.|10\.)/.test(host))
      return 'http://localhost:8000';
    return 'https://celltrail-api.onrender.com';
  }
  const API = getApiBase() + '/api';

  let _tempToken = null;
  let _oldPassword = '';

  if (new URLSearchParams(location.search).get('expired') === '1') {
    setLoginMsg('登入已過期，請重新登入');
  }

  (async function init() {
    const tok = localStorage.getItem(TOKEN_KEY);
    if (!tok) return;
    try {
      const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${tok}` } });
      if (!r.ok) throw 0;
      const user = await r.json();
      if (user.must_change_password) {
        localStorage.removeItem(TOKEN_KEY);
        setLoginMsg('請重新輸入帳號密碼以完成密碼修改');
      } else {
        window.location.href = './index.html';
      }
    } catch {
      localStorage.removeItem(TOKEN_KEY);
    }
  })();

  function setLoginMsg(txt, ok) {
    const el = document.getElementById('loginMsg');
    el.textContent = txt;
    el.className = ok ? 'msg ok' : 'msg';
  }
  function setChangeMsg(txt, ok) {
    const el = document.getElementById('changeMsg');
    el.textContent = txt;
    el.className = ok ? 'msg ok' : 'msg';
  }

  async function doLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    if (!u || !p) { setLoginMsg('請填入帳號與密碼'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    setLoginMsg('登入中…');
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username: u, password: p }),
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.detail || `HTTP ${res.status}`);
      localStorage.setItem(TOKEN_KEY, j.access_token);
      _tempToken = j.access_token;
      if (j.must_change_password) {
        _oldPassword = p;
        sessionStorage.setItem('_cp_old', p);
        setLoginMsg('');
        window.location.href = './change-password.html';
      } else {
        window.location.href = './index.html';
      }
    } catch (e) {
      setLoginMsg(e.message || '登入失敗');
      btn.disabled = false;
    }
  }

  async function doChangePassword() {
    const p1 = document.getElementById('newPass1').value;
    const p2 = document.getElementById('newPass2').value;
    if (p1.length < 8) { setChangeMsg('新密碼至少 8 個字元'); return; }
    if (p1 !== p2) { setChangeMsg('兩次輸入不一致'); return; }
    const btn = document.getElementById('changeBtn');
    btn.disabled = true;
    setChangeMsg('修改中…');
    try {
      const res = await fetch(`${API}/auth/change-password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${_tempToken}`,
        },
        body: JSON.stringify({ current_password: _oldPassword, new_password: p1 }),
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.detail || `HTTP ${res.status}`);
      _oldPassword = '';
      setChangeMsg('密碼修改成功，正在進入系統…', true);
      setTimeout(() => { window.location.href = './index.html'; }, 700);
    } catch (e) {
      setChangeMsg(e.message || '修改失敗');
      btn.disabled = false;
    }
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPass').focus();
  });
  document.getElementById('forgotToggle').addEventListener('click', () => {
    const box = document.getElementById('forgotBox');
    box.style.display = box.style.display === 'none' ? '' : 'none';
  });
  document.getElementById('changeBtn').addEventListener('click', doChangePassword);
  document.getElementById('newPass1').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newPass2').focus();
  });
  document.getElementById('newPass2').addEventListener('keydown', e => {
    if (e.key === 'Enter') doChangePassword();
  });
</script>
</body>
</html>
