<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>登入 · CellTrail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      /* fallback：影片無法播放時的深色漸層 */
      background: linear-gradient(135deg, #0d1117 0%, #161b22 50%, #0d1117 100%);
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, 'Noto Sans TC';
      color: #f0f0f0;
    }

    /* ── 影片全螢幕背景 ── */
    #bgVideo {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      pointer-events: none;
    }
    /* 半透明深色遮罩 */
    #bgOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: -1;
    }

    /* ── 置中容器 ── */
    .wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    /* ── 毛玻璃登入卡片 ── */
    .card {
      width: min(92vw, 400px);
      border-radius: 16px;
      padding: 34px 30px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
    }
    .brand { text-align: center; margin-bottom: 26px; }
    .brand h1 { margin: 0; font-size: 26px; font-weight: 700; color: #fff; letter-spacing: .5px; }
    .brand p  { margin: 7px 0 0; font-size: 12px; color: rgba(255,255,255,0.65); }

    .section-title { font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.9); margin-bottom: 14px; }

    label { display: block; margin-bottom: 14px; font-size: 13px; color: rgba(255,255,255,0.8); font-weight: 500; }

    input[type="text"], input[type="password"] {
      display: block; width: 100%; padding: 10px 12px; margin-top: 5px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px; font-size: 14px; color: #fff;
      background: rgba(255,255,255,0.12);
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input::placeholder { color: rgba(255,255,255,0.4); }
    input:focus {
      border-color: rgba(99,179,237,0.8);
      box-shadow: 0 0 0 3px rgba(99,179,237,0.25);
      background: rgba(255,255,255,0.18);
    }

    button.primary {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      background: rgba(0,122,255,0.85); color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px;
      transition: background .15s;
      backdrop-filter: blur(4px);
    }
    button.primary:hover { background: rgba(0,98,204,0.95); }
    button.primary:disabled { background: rgba(0,122,255,0.35); cursor: not-allowed; }

    .msg { min-height: 18px; font-size: 12px; color: #ff9090; margin: 6px 0 10px; }
    .msg.ok { color: #7ef798; }

    .alert-box {
      background: rgba(255,248,225,0.15); border: 1px solid rgba(255,224,130,0.5);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: #ffe082; margin-bottom: 18px; line-height: 1.5;
    }

    .footer { text-align: center; font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 20px; }

    /* 申請 / 忘記密碼連結 */
    #loginSection a { color: rgba(99,179,237,0.9); text-decoration: none; }
    #loginSection a:hover { color: #fff; }
    #forgotToggle { color: rgba(255,255,255,0.5); cursor: pointer; text-decoration: underline; }
    #forgotBox {
      margin-top: 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      line-height: 1.8;
    }
  </style>
</head>
<body>

<!-- 影片背景 -->
<video id="bgVideo" autoplay muted loop playsinline preload="auto">
  <source src="assets/mp.mp4" type="video/mp4" />
</video>
<div id="bgOverlay"></div>

<div class="wrapper">
  <div class="card">
    <div class="brand">
      <h1>CellTrail</h1>
      <p>刑事偵查 · 基地台連線歷程分析系統</p>
    </div>

    <!-- 登入表單 -->
    <div id="loginSection">
      <div class="section-title">請登入</div>
      <label>帳號
        <input id="loginUser" type="text" placeholder="username" autocomplete="username" />
      </label>
      <label>密碼
        <input id="loginPass" type="password" placeholder="password" autocomplete="current-password" />
      </label>
      <div id="loginMsg" class="msg"></div>
      <button id="loginBtn" class="primary">登入</button>

      <div style="margin-top:14px;text-align:center;font-size:12px;display:flex;flex-direction:column;gap:6px">
        <a href="./register.html">申請帳號</a>
        <span id="forgotToggle">忘記帳號或密碼？</span>
      </div>
      <div id="forgotBox" style="display:none">
        請電洽管理員辦理重設<br/>
        <b>管理員電話：</b>07-7193020<br/>
        <b>服務時間：</b>週一至週五 09:00–17:00
      </div>
    </div>

    <!-- 首次登入修改密碼（must_change_password=true 時顯示） -->
    <div id="changePassSection" style="display:none">
      <div class="alert-box">
        ⚠ 首次登入需修改密碼，才能進入系統。
      </div>
      <div class="section-title">設定新密碼</div>
      <label>新密碼（至少 8 字元）
        <input id="newPass1" type="password" autocomplete="new-password" />
      </label>
      <label>確認新密碼
        <input id="newPass2" type="password" autocomplete="new-password" />
      </label>
      <div id="changeMsg" class="msg"></div>
      <button id="changeBtn" class="primary">修改密碼並進入系統</button>
    </div>

    <div class="footer">CellTrail · 高市刑大冠鈞</div>
  </div>
</div>

<script>
  const TOKEN_KEY = 'ct_token';

  function getApiBase() {
    if (window.__CELLTRAIL_API__) return window.__CELLTRAIL_API__.replace(/\/$/, '');
    const host = location.hostname || '';
    if (/^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\]|192\.168\.|10\.)/.test(host))
      return 'http://localhost:8000';
    return 'https://celltrail-api.onrender.com';
  }
  const API = getApiBase() + '/api';

  let _tempToken = null;
  let _oldPassword = '';

  if (new URLSearchParams(location.search).get('expired') === '1') {
    setLoginMsg('登入已過期，請重新登入');
  }

  (async function init() {
    const tok = localStorage.getItem(TOKEN_KEY);
    if (!tok) return;
    try {
      const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${tok}` } });
      if (!r.ok) throw 0;
      const user = await r.json();
      if (user.must_change_password) {
        localStorage.removeItem(TOKEN_KEY);
        setLoginMsg('請重新輸入帳號密碼以完成密碼修改');
      } else {
        window.location.href = './index.html';
      }
    } catch {
      localStorage.removeItem(TOKEN_KEY);
    }
  })();

  function setLoginMsg(txt, ok) {
    const el = document.getElementById('loginMsg');
    el.textContent = txt;
    el.className = ok ? 'msg ok' : 'msg';
  }
  function setChangeMsg(txt, ok) {
    const el = document.getElementById('changeMsg');
    el.textContent = txt;
    el.className = ok ? 'msg ok' : 'msg';
  }

  function showChangeSection() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('changePassSection').style.display = '';
    document.getElementById('newPass1').focus();
  }

  async function doLogin() {
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;
    if (!u || !p) { setLoginMsg('請填入帳號與密碼'); return; }
    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    setLoginMsg('登入中…');
    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: new URLSearchParams({ username: u, password: p }),
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.detail || `HTTP ${res.status}`);
      localStorage.setItem(TOKEN_KEY, j.access_token);
      _tempToken = j.access_token;
      if (j.must_change_password) {
        _oldPassword = p;
        sessionStorage.setItem('_cp_old', p);
        setLoginMsg('');
        window.location.href = './change-password.html';
      } else {
        window.location.href = './index.html';
      }
    } catch (e) {
      setLoginMsg(e.message || '登入失敗');
      btn.disabled = false;
    }
  }

  async function doChangePassword() {
    const p1 = document.getElementById('newPass1').value;
    const p2 = document.getElementById('newPass2').value;
    if (p1.length < 8) { setChangeMsg('新密碼至少 8 個字元'); return; }
    if (p1 !== p2) { setChangeMsg('兩次輸入不一致'); return; }
    const btn = document.getElementById('changeBtn');
    btn.disabled = true;
    setChangeMsg('修改中…');
    try {
      const res = await fetch(`${API}/auth/change-password`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${_tempToken}`,
        },
        body: JSON.stringify({ current_password: _oldPassword, new_password: p1 }),
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.detail || `HTTP ${res.status}`);
      _oldPassword = '';
      setChangeMsg('密碼修改成功，正在進入系統…', true);
      setTimeout(() => { window.location.href = './index.html'; }, 700);
    } catch (e) {
      setChangeMsg(e.message || '修改失敗');
      btn.disabled = false;
    }
  }

  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('loginUser').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginPass').focus();
  });
  document.getElementById('forgotToggle').addEventListener('click', () => {
    const box = document.getElementById('forgotBox');
    box.style.display = box.style.display === 'none' ? '' : 'none';
  });
  document.getElementById('changeBtn').addEventListener('click', doChangePassword);
  document.getElementById('newPass1').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newPass2').focus();
  });
  document.getElementById('newPass2').addEventListener('keydown', e => {
    if (e.key === 'Enter') doChangePassword();
  });
</script>
</body>
</html>
