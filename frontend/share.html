<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- 分享頁不應被搜尋引擎索引（連結屬半公開、僅憑 token） -->
  <meta name="robots" content="noindex,nofollow" />
  <title>CellTrail 分享檢視</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
  <style>
    html, body { margin:0; height:100%; font-family:system-ui,-apple-system,"Microsoft JhengHei",sans-serif; }
    #topbar {
      position:fixed; top:0; left:0; right:0; height:52px; z-index:1000;
      background:#1a2942; color:#fff; display:flex; align-items:center;
      gap:12px; padding:0 16px; box-shadow:0 2px 8px rgba(0,0,0,.3);
    }
    #topbar .brand { font-weight:700; font-size:15px; white-space:nowrap; }
    #topbar .proj  { font-size:14px; opacity:.95; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    #topbar .ro    { background:#3a4a66; font-size:11px; padding:2px 8px; border-radius:10px; white-space:nowrap; }
    #topbar .exp   { margin-left:auto; font-size:12px; opacity:.85; white-space:nowrap; }
    #map { position:absolute; top:52px; bottom:0; left:0; right:0; }
    #legend {
      position:fixed; left:12px; bottom:12px; z-index:1000; background:#fff;
      border-radius:8px; box-shadow:0 2px 10px rgba(0,0,0,.25); padding:8px 12px;
      font-size:12px; max-width:240px; max-height:40vh; overflow-y:auto; display:none;
    }
    #legend .row { display:flex; align-items:center; gap:6px; margin:3px 0; }
    #legend .sw  { width:12px; height:12px; border-radius:50%; flex:none; }
    .seq-dot {
      width:22px; height:22px; border-radius:50%; color:#fff; font-size:11px;
      font-weight:700; display:flex; align-items:center; justify-content:center;
      border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.4); box-sizing:border-box;
    }
    #overlay {
      position:fixed; inset:0; z-index:2000; background:#f4f6f9;
      display:flex; align-items:center; justify-content:center; text-align:center;
    }
    #overlay .box { max-width:420px; padding:32px 28px; }
    #overlay h2  { margin:0 0 10px; font-size:20px; color:#1a2942; }
    #overlay p   { margin:6px 0; color:#555; font-size:14px; line-height:1.6; }
    #overlay .ic { font-size:46px; margin-bottom:8px; }
    .leaflet-popup-content { font-size:13px; line-height:1.55; }
  </style>
</head>
<body>
  <div id="topbar">
    <span class="brand">🛰️ CellTrail</span>
    <span class="proj" id="projName">—</span>
    <span class="ro">唯讀檢視</span>
    <span class="exp" id="expInfo"></span>
  </div>
  <div id="map"></div>
  <div id="legend"></div>

  <div id="overlay">
    <div class="box">
      <div class="ic">⏳</div>
      <h2>載入中…</h2>
      <p>正在讀取分享的基地台歷程資料。</p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
  <script src="./api.js"></script>
  <script>
  (function () {
    'use strict';

    // API base 由 api.js 提供（不含 /api）
    const API = window.CT_API_BASE;

    // 與 index.html 相同的台灣 NLSC 公開圖磚（外部使用者也可存取）
    const TILE_URL = 'https://wmts.nlsc.gov.tw/wmts/EMAP/default/GoogleMapsCompatible/{z}/{y}/{x}';
    const COLORS = ['#e6194b','#3cb44b','#4363d8','#f58231','#911eb4','#008080',
                    '#9a6324','#800000','#808000','#000075','#e67e22','#16a085'];

    const $ = id => document.getElementById(id);
    const escH = s => String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
    const fmt = v => (v == null || v === '') ? '—' : escH(v);

    function showError(icon, title, lines) {
      $('overlay').innerHTML =
        '<div class="box"><div class="ic">' + icon + '</div><h2>' + escH(title) + '</h2>' +
        lines.map(l => '<p>' + escH(l) + '</p>').join('') + '</div>';
      $('overlay').style.display = 'flex';
    }

    // ── 方位角扇形（與 index.html 的 sector() 同一套大圓公式）──────
    function sector(lat, lng, azimuthDeg, radiusMeters, angleDeg) {
      const toRad = d => d * Math.PI / 180, toDeg = r => r * 180 / Math.PI;
      const R = 6378137, d = radiusMeters / R, f1 = toRad(lat), l1 = toRad(lng);
      const start = azimuthDeg - angleDeg / 2, end = azimuthDeg + angleDeg / 2;
      const steps = 36, pts = [[lat, lng]];
      for (let i = 0; i <= steps; i++) {
        const brg = toRad(start + (end - start) * i / steps);
        const sinf2 = Math.sin(f1) * Math.cos(d) + Math.cos(f1) * Math.sin(d) * Math.cos(brg);
        const f2 = Math.asin(sinf2);
        const y = Math.sin(brg) * Math.sin(d) * Math.cos(f1);
        const x = Math.cos(d) - Math.sin(f1) * sinf2;
        const l2 = l1 + Math.atan2(y, x);
        pts.push([toDeg(f2), ((toDeg(l2) + 540) % 360) - 180]);
      }
      return L.polygon(pts, { color:'#34c759', weight:1, fillOpacity:.08 });
    }

    function parseAz(v) {
      if (v == null || v === '') return null;
      const n = Number(v);
      return Number.isFinite(n) ? n : null;
    }

    // ── 到期資訊 ─────────────────────────────────────────────────
    // 每 30 秒更新「剩餘時間」；分頁久開也不會顯示過時數字，到期即蓋上失效畫面。
    function startExpiryWatch(iso) {
      const exp = new Date(iso);
      const t = exp.toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
      let timer = null;
      function tick() {
        const mins = Math.round((exp - Date.now()) / 60000);
        if (mins <= 0) {
          $('expInfo').textContent = '⏱ ' + t + ' 到期（已過期）';
          if (timer) clearInterval(timer);
          showError('⌛', '連結已過期',
            ['此分享連結 30 分鐘效期已到。', '請重新整理，或向分享者索取新連結。']);
          return;
        }
        const hh = Math.floor(mins / 60), mm = mins % 60;
        $('expInfo').textContent = '⏱ ' + t + ' 到期（剩 ' + (hh > 0 ? hh + ' 小時 ' : '') + mm + ' 分）';
      }
      tick();
      timer = setInterval(tick, 30000);
    }

    // ── 地圖渲染 ─────────────────────────────────────────────────
    function renderMap(data) {
      $('projName').textContent = '📁 ' + data.project_id;
      startExpiryWatch(data.expires_at);

      const map = L.map('map', { preferCanvas:true }).setView([22.6273, 120.3014], 12);
      L.tileLayer(TILE_URL, { maxZoom:18, attribution:'© 內政部國土測繪中心', crossOrigin:true }).addTo(map);

      const feats = (data.geojson && data.geojson.features) || [];
      if (!feats.length) {
        showError('🗺️', '此專案沒有可顯示的點位',
          ['資料可能尚未定位成功（無可繪製的基地台座標）。']);
        return;
      }

      // 依 target_id 分組、組內依時間排序
      const groups = new Map();
      feats.forEach(f => {
        const c = f.geometry && f.geometry.coordinates;
        if (!c) return;
        const p = f.properties || {};
        const id = String(p.target_id || 'unknown');
        if (!groups.has(id)) groups.set(id, []);
        groups.get(id).push({
          lat:c[1], lng:c[0], p,
          ts:p.start_ts ? new Date(p.start_ts).getTime() : 0,
        });
      });

      const cluster = L.markerClusterGroup({
        showCoverageOnHover:false, maxClusterRadius:50, chunkedLoading:true,
      });
      const overlay = L.layerGroup().addTo(map);
      const bounds = [];
      const legendRows = [];
      let ci = 0;

      groups.forEach((recs, id) => {
        const color = COLORS[ci % COLORS.length]; ci++;
        recs.sort((a, b) => a.ts - b.ts);
        legendRows.push('<div class="row"><span class="sw" style="background:' + color +
          '"></span><span>' + escH(id) + '（' + recs.length + ' 點）</span></div>');

        recs.forEach((r, i) => {
          const p = r.p, seq = i + 1;
          bounds.push([r.lat, r.lng]);

          const marker = L.marker([r.lat, r.lng], {
            icon: L.divIcon({
              className:'', iconSize:[22,22], iconAnchor:[11,11],
              html:'<div class="seq-dot" style="background:' + color + '">' + seq + '</div>',
            }),
          });
          const azTxt = (p.azimuth != null) ? '　azimuth: ' + escH(p.azimuth) + '°' : '';
          const refTxt = (p.azimuth != null)
            ? '北方基準: ' + (p.azimuth_ref === 'magnetic' ? '磁北'
                : p.azimuth_ref === 'true' ? '真北'
                : '<span style="color:#c00;font-weight:bold">未標註 ⚠ 證據風險</span>') + '<br/>'
            : '';
          const secTxt = (p.sector_name || p.sector_id || p.site_code)
            ? 'sector: ' + fmt(p.sector_name) + '（' + fmt(p.sector_id) + '）　site: ' + fmt(p.site_code) + '<br/>'
            : '';
          marker.bindPopup(
            '<div style="min-width:240px">' +
            '<b>' + fmt(p.target_id) + '</b>　#' + seq + '<br/>' +
            fmt(p.cell_addr) + '<br/>' +
            fmt(p.start_ts) + ' → ' + fmt(p.end_ts) + '<br/>' +
            'cell_id: ' + (fmt(p.cell_id)) + azTxt + '<br/>' +
            refTxt + secTxt +
            '精度≈ ' + fmt(p.accuracy_m) + ' m</div>'
          );
          cluster.addLayer(marker);

          // 精度圓
          const acc = Number(p.accuracy_m || 0);
          if (acc > 0) {
            overlay.addLayer(L.circle([r.lat, r.lng], {
              radius:acc, color:color, weight:1, fillOpacity:.05,
            }));
          }
          // 方位角扇形（僅當 azimuth 為有效數值）
          const az = parseAz(p.azimuth);
          if (az !== null) {
            overlay.addLayer(sector(r.lat, r.lng, az, Math.max(acc, 300), 60));
          }
        });
      });

      map.addLayer(cluster);
      if (bounds.length) map.fitBounds(bounds, { padding:[40, 40] });

      if (groups.size > 1) {
        $('legend').innerHTML = '<div style="font-weight:700;margin-bottom:4px">資料組</div>' +
          legendRows.join('');
        $('legend').style.display = '';
      }
      $('overlay').style.display = 'none';
    }

    // ── 載入 ─────────────────────────────────────────────────────
    async function init() {
      const token = new URLSearchParams(location.search).get('t');
      if (!token) {
        showError('🔗', '連結無效', ['網址缺少分享識別碼，請確認連結是否完整複製。']);
        return;
      }
      try {
        const res = await fetch(API + '/api/share/' + encodeURIComponent(token));
        if (res.status === 404) {
          showError('❓', '連結不存在', ['此分享連結無效，可能網址有誤。']);
          return;
        }
        if (res.status === 410) {
          const j = await res.json().catch(() => ({}));
          showError('⌛', '連結已失效',
            [j.detail || '此分享連結已過期或已被撤銷。', '分享連結有效期為 30 分鐘，請向分享者索取新連結。']);
          return;
        }
        if (!res.ok) {
          showError('⚠️', '載入失敗', ['伺服器回應 HTTP ' + res.status + '，請稍後再試。']);
          return;
        }
        renderMap(await res.json());
      } catch (e) {
        console.error(e);
        showError('📡', '無法連線', ['無法連到伺服器，請檢查網路後重新整理。']);
      }
    }

    init();
  })();
  </script>
</body>
</html>
