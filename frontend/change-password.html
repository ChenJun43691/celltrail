<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>修改密碼 · CellTrail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #f0f2f5;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, 'Noto Sans TC'; }
    .wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }
    .card {
      background: #fff; width: min(92vw, 400px); border-radius: 14px;
      padding: 32px 28px; box-shadow: 0 4px 32px rgba(0,0,0,.12);
    }
    .brand { text-align: center; margin-bottom: 22px; }
    .brand h1 { margin: 0; font-size: 22px; font-weight: 700; color: #1a1a2e; }
    .brand p  { margin: 6px 0 0; font-size: 12px; color: #888; }
    .section-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 14px; }
    .alert-box {
      background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px;
      padding: 10px 14px; font-size: 13px; color: #6d4c00; margin-bottom: 18px; line-height: 1.5;
    }
    label { display: block; margin-bottom: 14px; font-size: 13px; color: #555; font-weight: 500; }
    input[type="password"] {
      display: block; width: 100%; padding: 10px 12px; margin-top: 5px;
      border: 1px solid #d0d5dd; border-radius: 8px; font-size: 14px;
      outline: none; transition: border-color .15s, box-shadow .15s;
    }
    input:focus { border-color: #007aff; box-shadow: 0 0 0 3px rgba(0,122,255,.15); }
    button.primary {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      background: #007aff; color: #fff; font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 6px; transition: background .15s;
    }
    button.primary:hover { background: #0062cc; }
    button.primary:disabled { background: #a0c4ff; cursor: not-allowed; }
    .msg { min-height: 18px; font-size: 12px; color: #d32f2f; margin: 6px 0 10px; }
    .msg.ok { color: #2e7d32; }
    .footer { text-align: center; font-size: 11px; color: #bbb; margin-top: 20px; }
    a.back-link { display: block; text-align: center; margin-top: 14px; font-size: 13px; color: #007aff; text-decoration: none; }
  </style>
</head>
<body>
<div class="wrapper">
  <div class="card">
    <div class="brand">
      <h1>CellTrail</h1>
      <p>修改密碼</p>
    </div>

    <div id="changeSection">
      <div class="alert-box" id="firstLoginAlert" style="display:none">
        ⚠ 首次登入，請先設定您的個人密碼。
      </div>
      <div class="section-title">設定新密碼</div>
      <label>目前密碼
        <input id="oldPass" type="password" autocomplete="current-password" />
      </label>
      <label>新密碼（至少 8 字元）
        <input id="newPass1" type="password" autocomplete="new-password" />
      </label>
      <label>確認新密碼
        <input id="newPass2" type="password" autocomplete="new-password" />
      </label>
      <div id="changeMsg" class="msg"></div>
      <button id="changeBtn" class="primary">修改密碼</button>
      <a href="./index.html" class="back-link" id="backLink" style="display:none">← 跳過（不建議）</a>
    </div>

    <div class="footer">CellTrail · 高市刑大冠鈞</div>
  </div>
</div>

<script>
  const TOKEN_KEY = 'ct_token';

  function getApiBase() {
    if (window.__CELLTRAIL_API__) return window.__CELLTRAIL_API__.replace(/\/$/, '');
    const host = location.hostname || '';
    if (/^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\]|192\.168\.|10\.)/.test(host))
      return 'http://localhost:8000';
    return 'https://celltrail-api.onrender.com';
  }
  const API = getApiBase() + '/api';

  function setMsg(txt, ok) {
    const el = document.getElementById('changeMsg');
    el.textContent = txt;
    el.className = ok ? 'msg ok' : 'msg';
  }

  // 從 sessionStorage 取得 login.html 傳來的舊密碼（首次登入流程）
  const _prefillOld = sessionStorage.getItem('_cp_old') || '';
  if (_prefillOld) {
    document.getElementById('oldPass').value = _prefillOld;
    sessionStorage.removeItem('_cp_old');  // 讀後即刪，避免殘留
    document.getElementById('firstLoginAlert').style.display = '';
  }

  // 驗證 token（非首次登入時也可用此頁修改密碼）
  (async function init() {
    const tok = localStorage.getItem(TOKEN_KEY);
    if (!tok) { window.location.href = './login.html'; return; }
    try {
      const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${tok}` } });
      if (!r.ok) {
        localStorage.removeItem(TOKEN_KEY);
        window.location.href = './login.html?expired=1';
        return;
      }
      const u = await r.json();
      if (!u.must_change_password) {
        // 非首次登入：顯示「跳過」連結讓使用者可以返回
        document.getElementById('backLink').style.display = '';
      }
    } catch {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = './login.html';
    }
  })();

  async function doChange() {
    const old   = document.getElementById('oldPass').value;
    const pass1 = document.getElementById('newPass1').value;
    const pass2 = document.getElementById('newPass2').value;
    if (!old)             { setMsg('請輸入目前密碼'); return; }
    if (pass1.length < 8) { setMsg('新密碼至少 8 個字元'); return; }
    if (pass1 !== pass2)  { setMsg('兩次輸入不一致'); return; }
    if (old === pass1)    { setMsg('新密碼不可與舊密碼相同'); return; }

    const btn = document.getElementById('changeBtn');
    btn.disabled = true;
    setMsg('修改中…');

    const tok = localStorage.getItem(TOKEN_KEY);
    try {
      const res = await fetch(`${API}/auth/change-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${tok}` },
        body: JSON.stringify({ current_password: old, new_password: pass1 }),
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.detail || `HTTP ${res.status}`);
      setMsg('密碼修改成功，即將進入系統…', true);
      setTimeout(() => { window.location.href = './index.html'; }, 800);
    } catch (e) {
      setMsg(e.message || '修改失敗');
      btn.disabled = false;
    }
  }

  document.getElementById('changeBtn').addEventListener('click', doChange);
  document.getElementById('newPass1').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newPass2').focus();
  });
  document.getElementById('newPass2').addEventListener('keydown', e => {
    if (e.key === 'Enter') doChange();
  });
  document.getElementById('oldPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newPass1').focus();
  });
</script>
</body>
</html>
