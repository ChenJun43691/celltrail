<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>修改密碼 · CellTrail</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; background: #050a19; }
    body {
      min-height: 100%; background: transparent;
      font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e8eef8;
    }
    #bgVideo {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: -1; pointer-events: none;
    }
    #bgOverlay {
      position: fixed; inset: 0;
      background: rgba(5, 10, 25, 0.62); z-index: 0;
    }
    .page {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 16px 48px;
    }
    .card {
      width: min(90vw, 420px); border-radius: 12px;
      padding: 0 0 28px; background: rgba(8, 18, 40, 0.85);
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: none; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.60);
      opacity: 0; animation: fadeInUp .7s ease .2s forwards; overflow: hidden;
    }
    .card-logo { padding: 24px 30px 0; text-align: center; }
    .card-logo img {
      width: 100%; max-width: 360px; height: auto;
      display: block; margin: 0 auto; background: transparent;
    }
    .card-logo-divider {
      margin: 18px 0 0; border: none;
      border-bottom: 1px solid rgba(255,255,255,0.10);
    }
    .card-body { padding: 22px 30px 0; }

    .card-title {
      font-size: 15px; font-weight: 600;
      color: rgba(180,210,255,0.9); margin-bottom: 16px;
      letter-spacing: .5px; display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: ''; display: inline-block; width: 3px; height: 16px;
      background: linear-gradient(180deg, #0099ff, #0055cc); border-radius: 2px;
    }
    .section-sep {
      border: none; border-top: 1px solid rgba(0,120,255,0.2); margin: 0 0 18px;
    }

    .alert-box {
      background: rgba(80, 60, 0, 0.35); border: 1px solid rgba(255,200,60,0.35);
      border-radius: 8px; padding: 10px 14px; font-size: 13px;
      color: #ffd875; margin-bottom: 18px; line-height: 1.5;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12px; font-weight: 500;
      color: rgba(160,200,255,0.75); margin-bottom: 6px; letter-spacing: .3px;
    }
    .field input[type="password"] {
      display: block; width: 100%; padding: 11px 14px;
      background: rgba(255,255,255,0.07); border: 1px solid rgba(0,150,255,0.35);
      border-radius: 8px; font-size: 14px; font-family: inherit; color: #e8eef8;
      outline: none; transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus {
      background: rgba(255,255,255,0.11); border-color: rgba(0,170,255,0.75);
      box-shadow: 0 0 0 3px rgba(0,140,255,0.18), 0 0 12px rgba(0,140,255,0.12);
    }

    .msg { min-height: 17px; font-size: 12px; color: #ff7070; margin: 4px 0 12px; }
    .msg.ok { color: #60e87a; }

    .btn-primary {
      width: 100%; padding: 12px; border: none; border-radius: 8px;
      background: linear-gradient(135deg, #0066cc 0%, #0099ff 100%);
      color: #fff; font-size: 14px; font-weight: 600; font-family: inherit;
      letter-spacing: .5px; cursor: pointer;
      transition: filter .2s, box-shadow .2s, transform .1s;
      box-shadow: 0 4px 18px rgba(0,120,255,0.35); margin-top: 4px;
    }
    .btn-primary:hover { filter: brightness(1.18); box-shadow: 0 6px 24px rgba(0,150,255,0.55); }
    .btn-primary:active { transform: scale(.985); filter: brightness(.95); }
    .btn-primary:disabled {
      background: linear-gradient(135deg, #1a3a66 0%, #1a5577 100%);
      box-shadow: none; cursor: not-allowed; filter: none;
    }

    .back-link {
      display: block; text-align: center; margin-top: 14px;
      font-size: 12px; color: rgba(100,180,255,0.6); text-decoration: none;
      transition: color .15s;
    }
    .back-link:hover { color: rgba(100,180,255,0.9); }

    .footer {
      margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.25);
      text-align: center; letter-spacing: .3px;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) {
      .card-logo { padding: 20px 18px 0; }
      .card-body  { padding: 20px 18px 0; }
      .card { padding-bottom: 22px; }
    }
  </style>
</head>
<body>
<video id="bgVideo" autoplay muted loop playsinline preload="auto">
  <source src="assets/mp.mp4" type="video/mp4" />
</video>
<div id="bgOverlay"></div>

<div class="page">
  <div class="card">
    <div class="card-logo">
      <img src="assets/logo.png" alt="CellTrail" />
      <hr class="card-logo-divider" />
    </div>
    <div class="card-body">

      <div id="changeSection">
        <div class="alert-box" id="firstLoginAlert" style="display:none">
          ⚠ 首次登入，請先設定您的個人密碼。
        </div>
        <div class="card-title">設定新密碼</div>
        <hr class="section-sep" />
        <div class="field">
          <label for="oldPass">目前密碼</label>
          <input id="oldPass" type="password" autocomplete="current-password" />
        </div>
        <div class="field">
          <label for="newPass1">新密碼（至少 8 字元）</label>
          <input id="newPass1" type="password" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="newPass2">確認新密碼</label>
          <input id="newPass2" type="password" autocomplete="new-password" />
        </div>
        <div id="changeMsg" class="msg"></div>
        <button id="changeBtn" class="btn-primary">修改密碼</button>
        <a href="./index.html" class="back-link" id="backLink" style="display:none">← 跳過（不建議）</a>
      </div>

      <div class="footer">CellTrail · 高市刑大冠鈞</div>
    </div><!-- /.card-body -->
  </div><!-- /.card -->
</div><!-- /.page -->

<script>
  const TOKEN_KEY = 'ct_token';

  function getApiBase() {
    if (window.__CELLTRAIL_API__) return window.__CELLTRAIL_API__.replace(/\/$/, '');
    const host = location.hostname || '';
    if (/^(localhost|127\.0\.0\.1|0\.0\.0\.0|\[::1\]|192\.168\.|10\.)/.test(host))
      return 'http://localhost:8000';
    return 'https://celltrail-api.onrender.com';
  }
  const API = getApiBase() + '/api';

  function setMsg(txt, ok) {
    const el = document.getElementById('changeMsg');
    el.textContent = txt;
    el.className = ok ? 'msg ok' : 'msg';
  }

  const _prefillOld = sessionStorage.getItem('_cp_old') || '';
  if (_prefillOld) {
    document.getElementById('oldPass').value = _prefillOld;
    sessionStorage.removeItem('_cp_old');
    document.getElementById('firstLoginAlert').style.display = '';
  }

  (async function init() {
    const tok = localStorage.getItem(TOKEN_KEY);
    if (!tok) { window.location.href = './login.html'; return; }
    try {
      const r = await fetch(`${API}/auth/me`, { headers: { Authorization: `Bearer ${tok}` } });
      if (!r.ok) {
        localStorage.removeItem(TOKEN_KEY);
        window.location.href = './login.html?expired=1';
        return;
      }
      const u = await r.json();
      if (!u.must_change_password) {
        document.getElementById('backLink').style.display = '';
      }
    } catch {
      localStorage.removeItem(TOKEN_KEY);
      window.location.href = './login.html';
    }
  })();

  async function doChange() {
    const old   = document.getElementById('oldPass').value;
    const pass1 = document.getElementById('newPass1').value;
    const pass2 = document.getElementById('newPass2').value;
    if (!old)             { setMsg('請輸入目前密碼'); return; }
    if (pass1.length < 8) { setMsg('新密碼至少 8 個字元'); return; }
    if (pass1 !== pass2)  { setMsg('兩次輸入不一致'); return; }
    if (old === pass1)    { setMsg('新密碼不可與舊密碼相同'); return; }

    const btn = document.getElementById('changeBtn');
    btn.disabled = true;
    setMsg('修改中…');

    const tok = localStorage.getItem(TOKEN_KEY);
    try {
      const res = await fetch(`${API}/auth/change-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${tok}` },
        body: JSON.stringify({ current_password: old, new_password: pass1 }),
      });
      const j = await res.json();
      if (!res.ok) throw new Error(j.detail || `HTTP ${res.status}`);
      setMsg('密碼修改成功，即將進入系統…', true);
      setTimeout(() => { window.location.href = './index.html'; }, 800);
    } catch (e) {
      setMsg(e.message || '修改失敗');
      btn.disabled = false;
    }
  }

  document.getElementById('changeBtn').addEventListener('click', doChange);
  document.getElementById('newPass1').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newPass2').focus();
  });
  document.getElementById('newPass2').addEventListener('keydown', e => {
    if (e.key === 'Enter') doChange();
  });
  document.getElementById('oldPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('newPass1').focus();
  });
</script>
</body>
</html>
